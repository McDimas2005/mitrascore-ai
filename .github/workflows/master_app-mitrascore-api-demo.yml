name: Deploy API to Azure App Service

on:
  push:
    branches: [main, master]
    paths:
      - "apps/api/**"
      - ".github/workflows/master_app-mitrascore-api-demo.yml"
  workflow_dispatch:

concurrency:
  group: azure-api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  API_PATH: apps/api
  AZURE_WEBAPP_NAME: app-mitrascore-api-demo
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.API_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python manage.py test
        env:
          DEBUG: "true"
          USE_MOCK_AI: "true"
          USE_AZURE_BLOB_STORAGE: "false"

      - name: Collect static files
        run: python manage.py collectstatic --noinput
        env:
          DEBUG: "false"
          SECRET_KEY: ci-collectstatic-only-change-in-runtime
          ALLOWED_HOSTS: localhost,127.0.0.1
          USE_MOCK_AI: "true"
          USE_AZURE_BLOB_STORAGE: "false"

      - name: Deploy API package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: ${{ env.API_PATH }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BA4E3F7F6E7E41EEAAC5BAD2551ABE4F }}
