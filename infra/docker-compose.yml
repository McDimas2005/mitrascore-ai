services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mitrascore
      POSTGRES_USER: mitrascore
      POSTGRES_PASSWORD: mitrascore
    ports:
      - "5432:5432"
    volumes:
      - mitrascore_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitrascore -d mitrascore"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mitrascore_postgres:
